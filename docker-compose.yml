services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: tms-app
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - tms
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  nginx:
    image: nginx:1.27-alpine
    container_name: tms-nginx
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - tms
    depends_on:
      - app

  mysql:
    image: mysql:8.4
    container_name: tms-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-laravel}
      MYSQL_USER: ${DB_USERNAME:-laravel}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-secret}
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - tms
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_ROOT_PASSWORD:-secret}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: tms-redis
    ports:
      - "6379:6379"
    networks:
      - tms
    volumes:
      - redis-data:/data

  mailpit:
    image: axllent/mailpit:latest
    container_name: tms-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
    networks:
      - tms

networks:
  tms:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
